<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CatchUp</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">CatchUp</p>
        <h1>Summarize what’s happening in the open chat.</h1>
        <p class="subcopy">Works on WhatsApp Web, Telegram Web, and other message pages where the chat text is visible in the browser.</p>
      </header>

      <section class="card">
        <label for="apiKey">OpenAI API Key</label>
        <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />

        <label for="model">Model</label>
        <input id="model" type="text" value="gpt-4o-mini" />

        <div class="actions">
          <button id="saveSettings" class="secondary">Save</button>
          <button id="summarize">Summarize current tab</button>
        </div>
      </section>

      <section class="card">
        <div class="section-heading">
          <h2>Status</h2>
          <span id="status">Idle</span>
        </div>
        <pre id="output" class="output">Open a chat page, save your API key, then click summarize.</pre>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
